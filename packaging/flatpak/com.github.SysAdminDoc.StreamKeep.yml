app-id: com.github.SysAdminDoc.StreamKeep
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk
base: com.riverbankcomputing.PyQt.BaseApp
base-version: '6.8'
command: streamkeep
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher

cleanup-commands:
  - /app/cleanup-BaseApp.sh

modules:
  - name: ffmpeg
    buildsystem: autotools
    config-opts:
      - --disable-doc
      - --disable-static
      - --enable-shared
      - --enable-gpl
      - --enable-libx264
      - --enable-libx265
      - --enable-libvpx
      - --enable-libopus
    sources:
      - type: archive
        url: https://ffmpeg.org/releases/ffmpeg-7.1.tar.xz
        sha256: PLACEHOLDER  # update with actual hash

  - name: streamkeep
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --find-links=. --prefix=/app yt-dlp send2trash websocket-client keyring Pillow
      - pip3 install --no-index --prefix=/app .
      - install -Dm644 packaging/flatpak/com.github.SysAdminDoc.StreamKeep.desktop /app/share/applications/com.github.SysAdminDoc.StreamKeep.desktop
      - install -Dm644 assets/icon.ico /app/share/icons/hicolor/256x256/apps/com.github.SysAdminDoc.StreamKeep.png
      - install -Dm644 packaging/flatpak/com.github.SysAdminDoc.StreamKeep.metainfo.xml /app/share/metainfo/com.github.SysAdminDoc.StreamKeep.metainfo.xml
    sources:
      - type: dir
        path: ../..
